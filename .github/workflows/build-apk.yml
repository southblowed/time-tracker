name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install flask anthropic requests Pillow

      - name: Generate standalone HTML and assets
        run: |
          mkdir -p android/app/src/main/assets/static
          python app.py &
          sleep 3
          curl -s http://localhost:5000/ > android/app/src/main/assets/index.html
          kill %1 2>/dev/null || true
          cp -r static/* android/app/src/main/assets/static/
          cp -r static/icons android/app/src/main/assets/icons/
          sed -i 's|/static/|static/|g' android/app/src/main/assets/index.html
          sed -i '/serviceWorker/d' android/app/src/main/assets/index.html

      - name: Generate Android icons
        run: python scripts/generate_icons.py android/app/src/main/res

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-33" "build-tools;33.0.2" --sdk_root=$ANDROID_SDK_ROOT

      - name: Create Android local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Generate Gradle Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.5

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Align and sign APK with apksigner
        run: |
          APK=$(find android -name "*-release-unsigned.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find android -name "*.apk" -not -name "*-unaligned.apk" | head -1)
          fi
          DIR=$(dirname "$APK")
          echo "APK: $APK"

          # Generate keystore
          keytool -genkey -v -keystore /tmp/debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=TimeTracker, OU=Dev, O=TimeTracker, L=Unknown, ST=Unknown, C=CN"

          # Align first
          ZIPALIGN=$(ls $ANDROID_SDK_ROOT/build-tools/*/zipalign 2>/dev/null | head -1)
          if [ -n "$ZIPALIGN" ]; then
            $ZIPALIGN -v -p 4 "$APK" "$DIR/aligned.apk"
          else
            cp "$APK" "$DIR/aligned.apk"
          fi

          # Sign with apksigner (v1+v2+v3 schemes)
          APKSIGNER=$(ls $ANDROID_SDK_ROOT/build-tools/*/apksigner 2>/dev/null | head -1)
          if [ -n "$APKSIGNER" ]; then
            $APKSIGNER sign --ks /tmp/debug.keystore --ks-pass pass:android \
              --ks-key-alias debug --v1-signing-enabled true --v2-signing-enabled true \
              --out "$DIR/time-tracker.apk" "$DIR/aligned.apk"
          else
            # Fallback: jarsigner (v1 only)
            jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
              -keystore /tmp/debug.keystore -storepass android \
              -signedjar "$DIR/time-tracker.apk" "$DIR/aligned.apk" debug
          fi
          ls -lh "$DIR/time-tracker.apk"
          echo "APK ready for install"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: time-tracker-apk
          path: |
            android/app/build/outputs/apk/**/*.apk
            android/app/build/outputs/apk/release/*.apk
            android/**/time-tracker.apk
          retention-days: 30