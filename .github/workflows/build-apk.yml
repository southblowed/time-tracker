name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install flask anthropic requests Pillow

      - name: Generate standalone HTML and assets
        run: |
          python app.py &
          sleep 3
          curl -s http://localhost:5000/ > android/app/src/main/assets/index.html
          kill %1 2>/dev/null || true
          cp -r static android/app/src/main/assets/static/
          cp -r static/icons android/app/src/main/assets/icons/
          sed -i 's|/static/|static/|g' android/app/src/main/assets/index.html
          sed -i '/serviceWorker/d' android/app/src/main/assets/index.html

      - name: Generate Android icons
        run: python scripts/generate_icons.py android/app/src/main/res

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.5

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK with debug key
        run: |
          keytool -genkey -v -keystore /tmp/debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=TimeTracker, OU=Dev, O=TimeTracker, L=Unknown, ST=Unknown, C=CN"
          APK=$(find android -name "*-release-unsigned.apk" | head -1)
          if [ -n "$APK" ]; then
            jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
              -keystore /tmp/debug.keystore -storepass android "$APK" debug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: time-tracker-apk
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30