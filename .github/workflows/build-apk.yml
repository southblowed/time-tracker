name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install flask anthropic requests Pillow

      - name: Generate standalone HTML and assets
        run: |
          python app.py &
          sleep 4
          mkdir -p android/app/src/main/assets/static/chart
          curl -s http://localhost:5000/ > android/app/src/main/assets/index.html
          kill %1 2>/dev/null || true

          # Bundle Chart.js locally for offline APK use
          curl -sL "https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.7/chart.umd.min.js" \
            -o android/app/src/main/assets/static/chart/chart.umd.min.js 2>/dev/null || \
          curl -sL "https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" \
            -o android/app/src/main/assets/static/chart/chart.umd.min.js 2>/dev/null || true

          cp -r static android/app/src/main/assets/static/
          cp -r static/icons android/app/src/main/assets/icons/
          sed -i 's|/static/|static/|g' android/app/src/main/assets/index.html
          sed -i '/serviceWorker/d' android/app/src/main/assets/index.html
          # Replace CDN links with local file
          sed -i 's|https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.7/chart.umd.min.js|static/chart/chart.umd.min.js|g' \
            android/app/src/main/assets/index.html
          sed -i 's|https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js|static/chart/chart.umd.min.js|g' \
            android/app/src/main/assets/index.html
          echo "Assets ready"
          ls -la android/app/src/main/assets/

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" --sdk_root=$ANDROID_SDK_ROOT 2>&1 || \
          sdkmanager "platforms;android-35" "build-tools;35.0.0" --sdk_root=$ANDROID_SDK_ROOT 2>&1

      - name: Create local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        working-directory: android
        run: gradle wrapper --gradle-version 8.7 && ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign with apksigner
        run: |
          APK=$(find android -name "*-release-unsigned.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find android -name "*.apk" -not -name "*-unaligned.apk" | head -1)
          fi
          echo "APK: $APK"
          DIR=$(dirname "$APK")

          keytool -genkey -v -keystore /tmp/timetracker.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass timetracker -keypass timetracker \
            -dname "CN=TimeTracker, OU=Dev, O=TimeTracker, C=CN"

          ZIPALIGN=$(ls $ANDROID_SDK_ROOT/build-tools/*/zipalign 2>/dev/null | head -1)
          if [ -n "$ZIPALIGN" ]; then
            $ZIPALIGN -v -p 4 "$APK" "$DIR/aligned.apk"
          else
            cp "$APK" "$DIR/aligned.apk"
          fi

          APKSIGNER=$(ls $ANDROID_SDK_ROOT/build-tools/*/apksigner 2>/dev/null | head -1)
          if [ -n "$APKSIGNER" ]; then
            $APKSIGNER sign --ks /tmp/timetracker.keystore --ks-pass pass:timetracker \
              --ks-key-alias release --v1-signing-enabled true --v2-signing-enabled true --v3-signing-enabled true \
              --out "$DIR/TimeTracker.apk" "$DIR/aligned.apk"
            echo "Signed with apksigner"
          fi
          ls -lh "$DIR/TimeTracker.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TimeTracker-APK
          path: android/**/TimeTracker.apk
          retention-days: 30